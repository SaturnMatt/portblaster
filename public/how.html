    <h1>How it works</h1>
    <ol>
      <li>The GUI reads a port and root directory.</li>
      <li>A server thread binds to <code>127.0.0.1</code>.</li>
      <li>Each request is parsed as <code>GET</code> or <code>HEAD</code>.</li>
      <li>The URL is resolved under the configured root.</li>
      <li>The file is sent with a compact HTTP response.</li>
    </ol>
